kind = "web"
previewPath = "/"
title = "OrangeTrack - Sistema de Gestão"
version = "1.0.0"
id = "artifacts/orange-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24783

[services.development]
run = "pnpm --filter @workspace/orange-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orange-manager", "run", "build" ]
publicDir = "artifacts/orange-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24783"
BASE_PATH = "/"
